<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peti.PRO — Petições em segundos</title>
  <meta name="description" content="Gere petições jurídicas completas em segundos com inteligência artificial. Peti.PRO." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:    #C9943A;
      --amber-light: #e8b85a;
      --amber-pale: #fdf3e3;
      --coffee:   #6B3F1E;
      --green:    #3D6B45;
      --linen:    #FAF0E0;
      --linen-dark: #f0e0cc;
      --text:      #1C1C1C;
      --text-sec: #6B6B6B;
      --white:    #ffffff;
      --red-soft: #c0392b;
      --sidebar-w: 240px;
      --radius:   6px;
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--linen);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LAYOUT ───────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px; background: var(--linen);
      border-bottom: 1px solid var(--amber); flex-shrink: 0;
      position: relative; z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif; font-size: 28px;
      font-weight: 700; color: var(--amber); letter-spacing: -0.5px;
    }

    .hamburger {
      display: none; background: none; border: none; cursor: pointer;
      padding: 8px; flex-direction: column; gap: 5px;
    }

    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
    }

    .body-row { display: flex; flex: 1; overflow: hidden; }

    /* ─── SIDEBAR ──────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); background: var(--linen-dark);
      border-right: 1px solid rgba(201,148,58,0.2);
      display: flex; flex-direction: column; flex-shrink: 0;
      overflow: hidden; transition: transform 0.25s ease;
    }

    .sidebar-top { padding: 20px 16px 0; flex-shrink: 0; }
    .sidebar-title-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
    .sidebar-title { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-sec); }
    .sidebar-counter { font-size: 11px; color: var(--text-sec); }

    .sidebar-search {
      width: 100%; font-family: inherit; font-size: 12px; padding: 7px 10px;
      border: 1.5px solid rgba(201,148,58,0.25); border-radius: var(--radius);
      background: var(--linen); color: var(--text); outline: none; margin-bottom: 12px;
    }

    .sidebar-list { flex: 1; overflow-y: auto; padding: 0 12px 8px; }
    .sidebar-item {
      position: relative; padding: 10px 8px; border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s ease; margin-bottom: 2px;
    }
    .sidebar-item:hover { background: rgba(201,148,58,0.12); }
    .sidebar-item-type { font-size: 12px; font-weight: 600; color: var(--amber); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-item-name { font-size: 12px; color: var(--text); margin-top: 2px; }

    .btn-item-delete {
      position: absolute; top: 8px; right: 6px; background: none; border: none;
      font-size: 13px; color: var(--text-sec); cursor: pointer; opacity: 0;
    }
    .sidebar-item:hover .btn-item-delete { opacity: 1; }

    .sidebar-footer { padding: 12px; border-top: 1px solid rgba(201,148,58,0.15); display: flex; flex-direction: column; gap: 6px; }
    .sidebar-export-row { display: flex; gap: 6px; }
    .btn-sidebar { flex: 1; background: none; border: 1px solid rgba(201,148,58,0.3); border-radius: var(--radius); padding: 7px 4px; font-size: 11px; cursor: pointer; }

    /* ─── MAIN ─────────────────────────────────────────────────── */
    .main { flex: 1; overflow-y: auto; padding: 48px 56px; }
    #screen-form { max-width: 760px; }
    .screen-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 32px; }

    .tipos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 36px; }
    .tipo-card {
      border: 1.5px solid rgba(201,148,58,0.2); border-radius: var(--radius);
      padding: 16px 14px; cursor: pointer; transition: all 0.18s ease; background: var(--linen);
    }
    .tipo-card:hover, .tipo-card.selected { border-color: var(--amber); background: var(--amber-pale); }
    .tipo-card.selected { border-width: 2px; }

    .form-fields, #form-trabalhista { display: none; }
    .form-fields.visible, #form-trabalhista.visible { display: block; animation: fadeIn 0.3s ease forwards; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-row.single { grid-template-columns: 1fr; }
    .field-wrap { display: flex; flex-direction: column; gap: 5px; }
    .field-wrap label { font-size: 13px; font-weight: 500; }
    .field-wrap input, .field-wrap textarea, .field-wrap select {
      font-family: inherit; font-size: 14px; padding: 10px 12px;
      border: 1.5px solid rgba(0,0,0,0.12); border-radius: var(--radius); outline: none;
    }
    .field-wrap input:focus { border-color: var(--amber); }
    .field-error { font-size: 12px; color: var(--red-soft); display: none; }
    .field-error.visible { display: block; }

    /* ─── BOTÕES ───────────────────────────────────────────────── */
    .btn-primary { background: var(--amber); color: #fff; border: none; border-radius: var(--radius); padding: 12px 24px; font-weight: 600; cursor: pointer; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: none; color: var(--amber); border: 1.5px solid var(--amber); border-radius: var(--radius); padding: 11px 20px; cursor: pointer; }

    /* ─── RESULTADO & CHAT ─────────────────────────────────────── */
    #screen-result { display: none; max-width: 760px; }
    .result-body {
      background: #fff; border-left: 3px solid var(--amber); padding: 32px;
      font-size: 14px; line-height: 1.8; white-space: pre-wrap; margin: 20px 0;
    }
    .chat-section { margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 20px; }
    .chat-tabs { display: flex; gap: 15px; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
    .chat-tab { padding: 10px; cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; }
    .chat-tab.active { border-bottom-color: var(--amber); color: var(--amber); font-weight: bold; }
    .chat-history { max-height: 300px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { padding: 10px 15px; border-radius: 8px; font-size: 13px; max-width: 85%; }
    .chat-msg-user { align-self: flex-end; background: var(--amber-pale); border: 1px solid var(--amber); }
    .chat-msg-ai { align-self: flex-start; background: #fff; border: 1px solid #ddd; }
    .chat-input-row { display: flex; gap: 10px; }
    .chat-input { flex: 1; padding: 10px; border-radius: var(--radius); border: 1px solid #ddd; resize: none; }

    /* ─── TRABALHISTA ESPECÍFICO ────────────────────────────── */
    .pedido-item { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
    .btn-pedido-action { background: var(--amber-pale); border: 1px solid var(--amber); color: var(--amber); width: 30px; height: 30px; cursor: pointer; border-radius: 4px; }
    
    /* ─── LOADING ─────────────────────────────────────────── */
    #screen-loading { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
    .dot { width: 10px; height: 10px; background: var(--amber); border-radius: 50%; display: inline-block; animation: blink 1.4s infinite; margin: 0 4px; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* ─── MOBILE ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 200; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 150; }
      .sidebar-overlay.open { display: block; }
      .main { padding: 20px; }
      .tipos-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <button class="hamburger" id="btn-hamburger"><span></span><span></span><span></span></button>
    <div class="logo">Peti.PRO</div>
    <button class="btn-primary" style="padding: 8px 16px; font-size: 13px;">7 dias grátis</button>
  </header>

  <div id="error-banner" style="display:none;background:#c0392b;color:#fff;padding:12px 32px;font-size:13px;font-weight:500;"></div>

  <div class="body-row">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-title-row">
          <span class="sidebar-title">Biblioteca</span>
          <span class="sidebar-counter" id="sidebar-counter">0</span>
        </div>
        <input class="sidebar-search" id="sidebar-search" type="text" placeholder="Buscar..." />
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="sidebar-footer">
        <div class="sidebar-export-row">
          <button class="btn-sidebar" id="btn-export-pdf">PDF Geral</button>
          <button class="btn-sidebar" id="btn-export-excel">Excel</button>
        </div>
        <button class="btn-sidebar" style="color: var(--red-soft);" id="btn-clear-hist">Limpar Tudo</button>
      </div>
    </aside>

    <main class="main">
      <!-- TELA 1: FORM -->
      <section id="screen-form">
        <h1 class="screen-title">Nova petição</h1>
        <div class="tipos-grid" id="tipos-grid">
          <div class="tipo-card" data-tipo="Inicial Trabalhista">⚖️ <b>Trabalhista</b></div>
          <div class="tipo-card" data-tipo="Habeas Corpus">🔓 <b>Habeas Corpus</b></div>
          <div class="tipo-card" data-tipo="Contestação Cível">🛡️ <b>Contestação</b></div>
          <div class="tipo-card" data-tipo="Indenização">💼 <b>Indenização</b></div>
        </div>

        <!-- FORM PADRÃO -->
        <div class="form-fields" id="form-fields">
          <div class="form-row">
            <div class="field-wrap">
              <label>Nome do Cliente *</label>
              <input type="text" id="campo-nome" />
              <span class="field-error" id="erro-nome">Obrigatório</span>
            </div>
            <div class="field-wrap">
              <label>CPF</label>
              <input type="text" id="campo-cpf" placeholder="000.000.000-00" />
            </div>
          </div>
          <div class="form-row single">
            <div class="field-wrap">
              <label>Fatos *</label>
              <textarea id="campo-fatos" rows="5"></textarea>
            </div>
          </div>
          <div class="form-row">
            <div class="field-wrap">
              <label>Pedido Principal *</label>
              <input type="text" id="campo-pedido" />
            </div>
            <div class="field-wrap">
              <label>Valor da Causa</label>
              <input type="text" id="campo-valor" placeholder="R$ 0,00" />
            </div>
          </div>
          <button class="btn-primary" id="btn-gerar">Gerar Petição →</button>
        </div>

        <!-- FORM TRABALHISTA -->
        <div id="form-trabalhista">
           <div class="form-row">
              <div class="field-wrap">
                <label>Nome do Reclamante *</label>
                <input type="text" id="t-nome" />
              </div>
              <div class="field-wrap">
                <label>CPF *</label>
                <input type="text" id="t-cpf" maxlength="14" />
              </div>
           </div>
           <div class="field-wrap" style="margin-bottom: 16px;">
              <label>Fatos do Trabalho *</label>
              <textarea id="t-fatos" rows="4"></textarea>
           </div>
           <div class="field-wrap">
              <label>Pedidos (um por linha)</label>
              <div id="t-pedidos-list">
                <div class="pedido-item"><input type="text" placeholder="Ex: Verbas Rescisórias" /></div>
              </div>
              <button class="btn-pedido-action" id="btn-add-pedido" type="button">+</button>
           </div>
           <div class="field-wrap" style="margin-top: 16px;">
              <label>Valor Estimado</label>
              <input type="text" id="t-valor" placeholder="0,00" />
           </div>
           <button class="btn-primary" style="margin-top: 20px;" id="btn-gerar-trab">Gerar Inicial →</button>
        </div>
      </section>

      <!-- TELA 2: LOADING -->
      <section id="screen-loading">
        <h3>Processando com Inteligência Jurídica...</h3>
        <div style="margin-top: 20px;">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </section>

      <!-- TELA 3: RESULTADO -->
      <section id="screen-result">
        <h2 id="result-tipo">Petição</h2>
        <div class="result-body" id="result-body"></div>
        <div style="display: flex; gap: 10px;">
          <button class="btn-secondary" id="btn-copiar">Copiar Texto</button>
          <button class="btn-primary" id="btn-pdf">Baixar PDF</button>
          <button class="btn-secondary" id="btn-nova">Nova</button>
        </div>

        <div class="chat-section">
          <div class="chat-tabs">
            <button class="chat-tab active" data-tab="refinamento">💬 Refinar</button>
            <button class="chat-tab" data-tab="simulacao">⚔️ Simular Defesa</button>
            <button class="chat-tab" data-tab="revisao">🔍 Revisar</button>
          </div>
          <div class="chat-history" id="chat-history"></div>
          <div class="chat-input-row">
            <textarea class="chat-input" id="chat-input" placeholder="Peça uma alteração..." rows="1"></textarea>
            <button class="btn-primary" id="btn-chat-send">Enviar</button>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
  /* ─── ESTADO & UTILS ─────────────────────────────────────── */
  let tipoSelecionado = '';
  let textoAtivo = '';
  let dadosAtivos = {};
  let chatHistorico = [];
  let chatModo = 'refinamento';
  const $ = id => document.getElementById(id);

  /* ─── MÁSCARAS ───────────────────────────────────────────── */
  const aplicarMascaras = () => {
    const maskCPF = v => v.replace(/\D/g, '').slice(0, 11).replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    const maskValor = v => {
      let val = v.replace(/\D/g, '');
      if (!val) return '';
      val = (parseInt(val) / 100).toFixed(2);
      return val.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    };
    $('campo-cpf').oninput = e => e.target.value = maskCPF(e.target.value);
    $('t-cpf').oninput = e => e.target.value = maskCPF(e.target.value);
    $('campo-valor').oninput = e => e.target.value = 'R$ ' + maskValor(e.target.value);
    $('t-valor').oninput = e => e.target.value = maskValor(e.target.value);
  };

  /* ─── TOKEN / SESSÃO ─────────────────────────────────────── */
  const getToken = async () => {
    const stored = localStorage.getItem('petipro_tok');
    if (stored) {
      try {
        const { token, trial_until } = JSON.parse(stored);
        if (trial_until > Date.now() + 60_000) return token;
      } catch {}
    }
    const resp = await fetch('/api/session', { method: 'POST' });
    if (!resp.ok) throw new Error('Falha ao iniciar sessão');
    const data = await resp.json();
    localStorage.setItem('petipro_tok', JSON.stringify(data));
    return data.token;
  };

  /* ─── ERROR BANNER ───────────────────────────────────────── */
  const showErro = (msg) => {
    const b = $('error-banner');
    b.textContent = msg;
    b.style.display = 'block';
    clearTimeout(b._t);
    b._t = setTimeout(() => { b.style.display = 'none'; }, 8000);
  };

  /* ─── NAVEGAÇÃO ──────────────────────────────────────────── */
  const showScreen = name => {
    $('screen-form').style.display = name === 'form' ? 'block' : 'none';
    $('screen-loading').style.display = name === 'loading' ? 'flex' : 'none';
    $('screen-result').style.display = name === 'result' ? 'block' : 'none';
  };

  /* ─── SSE STREAM READER ──────────────────────────────────── */
  async function readStream(resp, onChunk) {
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') return { ok: true };
        try {
          const obj = JSON.parse(raw);
          if (obj.erro) return { ok: false, erro: obj.erro };
          if (obj.t) onChunk(obj.t);
        } catch {}
      }
    }
    return { ok: true };
  }

  /* ─── CHAMADA API ────────────────────────────────────────── */
  async function chamarAPI(payload) {
    const token = await getToken();
    const resp = await fetch('/api/gerar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const data = await resp.json().catch(() => ({}));
      if (resp.status === 401) localStorage.removeItem('petipro_tok');
      throw new Error(data.erro || `Erro ${resp.status}`);
    }
    return resp;
  }

  /* ─── SELEÇÃO DE TIPO ────────────────────────────────────── */
  $('tipos-grid').onclick = e => {
    const card = e.target.closest('.tipo-card');
    if (!card) return;
    document.querySelectorAll('.tipo-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    tipoSelecionado = card.dataset.tipo;
    const isTrab = tipoSelecionado === 'Inicial Trabalhista';
    $('form-fields').classList.toggle('visible', !isTrab);
    $('form-trabalhista').classList.toggle('visible', isTrab);
  };

  /* ─── GERAR PETIÇÃO ──────────────────────────────────────── */
  const dispararGeracao = async (dados) => {
    showScreen('loading');
    try {
      const resp = await chamarAPI(dados);
      chatHistorico = [];
      dadosAtivos = { ...dados, id: Date.now() };
      $('result-tipo').textContent = dados.tipo;
      $('result-body').textContent = '▋';
      $('chat-history').innerHTML = '';
      showScreen('result');

      let text = '';
      const { ok, erro } = await readStream(resp, chunk => {
        text += chunk;
        $('result-body').textContent = text + '▋';
      });

      if (!ok) { showErro(erro || 'Erro durante geração.'); showScreen('form'); return; }
      textoAtivo = text;
      $('result-body').textContent = text;
      salvarNoHistorico(dadosAtivos, textoAtivo);
    } catch (e) {
      showErro(e.message || 'Falha técnica. Verifique sua conexão.');
      showScreen('form');
    }
  };

  $('btn-gerar').onclick = () => {
    const dados = {
      tipo: tipoSelecionado,
      nome: $('campo-nome').value,
      fatos: $('campo-fatos').value,
      pedido: $('campo-pedido').value,
      valor: $('campo-valor').value,
    };
    dispararGeracao(dados);
  };

  $('btn-gerar-trab').onclick = () => {
    const peds = Array.from($('t-pedidos-list').querySelectorAll('input')).map(i => i.value).join(', ');
    const dados = {
      tipo: tipoSelecionado,
      nome: $('t-nome').value,
      fatos: $('t-fatos').value,
      pedido: peds,
      valor: $('t-valor').value,
    };
    dispararGeracao(dados);
  };

  /* ─── CHAT ───────────────────────────────────────────────── */
  const appendMsg = (role, text) => {
    const div = document.createElement('div');
    div.className = `chat-msg chat-msg-${role === 'user' ? 'user' : 'ai'}`;
    div.textContent = text;
    $('chat-history').appendChild(div);
    $('chat-history').scrollTop = $('chat-history').scrollHeight;
    return div;
  };

  document.querySelector('.chat-tabs').onclick = e => {
    const tab = e.target.closest('.chat-tab');
    if (!tab) return;
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.toggle('active', t === tab));
    chatModo = tab.dataset.tab;
    chatHistorico = [];
    $('chat-history').innerHTML = '';
    const isRevisar = chatModo === 'revisao';
    $('chat-input').placeholder = isRevisar
      ? 'Clique em Revisar para analisar a petição...'
      : (chatModo === 'simulacao' ? 'Faça uma pergunta à defesa...' : 'Peça uma alteração...');
    $('btn-chat-send').textContent = isRevisar ? 'Revisar' : 'Enviar';
  };

  $('btn-chat-send').onclick = async () => {
    const instrucao = $('chat-input').value.trim();
    const isRevisar = chatModo === 'revisao';
    if (!instrucao && !isRevisar) return;

    $('chat-input').value = '';
    $('btn-chat-send').disabled = true;
    if (instrucao) appendMsg('user', instrucao);
    const aiMsg = appendMsg('assistant', '▋');

    try {
      let payload;
      if (isRevisar) {
        payload = { modo: 'revisao', peticaoAtual: textoAtivo };
      } else if (chatModo === 'simulacao') {
        payload = { modo: 'simulacao', peticaoAtual: textoAtivo, instrucao: instrucao || '', historico: chatHistorico };
      } else {
        payload = { modo: 'refinamento', peticaoAtual: textoAtivo, instrucao, historico: chatHistorico };
      }

      const resp = await chamarAPI(payload);
      let reply = '';
      const { ok, erro } = await readStream(resp, chunk => {
        reply += chunk;
        aiMsg.textContent = reply + '▋';
      });

      if (!ok) {
        aiMsg.textContent = `Erro: ${erro}`;
      } else {
        aiMsg.textContent = reply;
        if (!isRevisar) {
          chatHistorico.push({ role: 'user', content: instrucao });
          chatHistorico.push({ role: 'assistant', content: reply });
        }
        if (chatModo === 'refinamento') {
          const antesM = reply.match(/ANTES:\s*"([\s\S]*?)"\s*\n\nDEPOIS:/);
          const depoisM = reply.match(/DEPOIS:\s*"([\s\S]*?)"\s*$/);
          if (antesM && depoisM && textoAtivo.includes(antesM[1])) {
            textoAtivo = textoAtivo.replace(antesM[1], depoisM[1]);
            $('result-body').textContent = textoAtivo;
            let hist = JSON.parse(localStorage.getItem('petipro_h') || '[]');
            if (hist.length > 0) { hist[0].texto = textoAtivo; localStorage.setItem('petipro_h', JSON.stringify(hist)); }
          }
        }
      }
    } catch (e) {
      aiMsg.textContent = `Erro: ${e.message}`;
    }
    $('btn-chat-send').disabled = false;
  };

  /* ─── BIBLIOTECA ─────────────────────────────────────────── */
  const salvarNoHistorico = (dados, texto) => {
    let hist = getHistorico();
    hist.unshift({ dados, texto });
    if (hist.length > 50) hist = hist.slice(0, 50);
    localStorage.setItem('petipro_h', JSON.stringify(hist));
    renderizarBiblioteca();
  };

  const getHistorico = () => JSON.parse(localStorage.getItem('petipro_h') || '[]');

  const renderizarBiblioteca = () => {
    const hist = getHistorico();
    const q = $('sidebar-search').value.toLowerCase();
    const filtrado = q
      ? hist.filter(h => (h.dados.tipo || '').toLowerCase().includes(q) || (h.dados.nome || '').toLowerCase().includes(q))
      : hist;
    $('sidebar-counter').textContent = hist.length;
    $('sidebar-list').innerHTML = filtrado.map((item, idx) => `
      <div class="sidebar-item" onclick="carregarHistorico(${idx})">
        <div class="sidebar-item-type">${item.dados.tipo || 'Petição'}</div>
        <div class="sidebar-item-name">${item.dados.nome || ''}</div>
        <button class="btn-item-delete" onclick="event.stopPropagation();deletarHistorico(${idx})">✕</button>
      </div>
    `).join('');
  };

  window.carregarHistorico = idx => {
    const hist = getHistorico();
    const item = hist[idx];
    if (!item) return;
    textoAtivo = item.texto;
    dadosAtivos = item.dados;
    tipoSelecionado = item.dados.tipo || '';
    chatHistorico = [];
    $('result-tipo').textContent = item.dados.tipo || 'Petição';
    $('result-body').textContent = textoAtivo;
    $('chat-history').innerHTML = '';
    showScreen('result');
  };

  window.deletarHistorico = idx => {
    let hist = getHistorico();
    hist.splice(idx, 1);
    localStorage.setItem('petipro_h', JSON.stringify(hist));
    renderizarBiblioteca();
  };

  /* ─── PDF ────────────────────────────────────────────────── */
  const criarDocPDF = () => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const margin = 25;
    const maxW = doc.internal.pageSize.getWidth() - margin * 2;
    const pageH = doc.internal.pageSize.getHeight() - margin;
    const addSection = (titulo, texto, y0 = margin) => {
      let y = y0;
      doc.setFontSize(13); doc.setFont('helvetica', 'bold');
      doc.text(titulo, margin, y); y += 8;
      doc.setFontSize(11); doc.setFont('helvetica', 'normal');
      for (const line of doc.splitTextToSize(texto, maxW)) {
        if (y + 6 > pageH) { doc.addPage(); y = margin; }
        doc.text(line, margin, y); y += 6;
      }
    };
    return { doc, addSection };
  };

  const exportarPDF = (titulo, texto) => {
    const { doc, addSection } = criarDocPDF();
    addSection(titulo, texto);
    doc.save(`${titulo.replace(/[^a-z0-9]/gi, '_')}.pdf`);
  };

  $('btn-pdf').onclick = () => { if (textoAtivo) exportarPDF(dadosAtivos.tipo || 'Petição', textoAtivo); };

  $('btn-export-pdf').onclick = () => {
    const hist = getHistorico();
    if (!hist.length) { showErro('Biblioteca vazia.'); return; }
    const { doc, addSection } = criarDocPDF();
    hist.forEach((item, i) => {
      if (i > 0) doc.addPage();
      addSection(item.dados.tipo || 'Petição', item.texto);
    });
    doc.save('biblioteca_peti_pro.pdf');
  };

  /* ─── EXCEL ──────────────────────────────────────────────── */
  $('btn-export-excel').onclick = () => {
    const hist = getHistorico();
    if (!hist.length) { showErro('Biblioteca vazia.'); return; }
    const rows = hist.map(item => ({
      Tipo: item.dados.tipo || '',
      Cliente: item.dados.nome || '',
      Data: item.dados.id ? new Date(item.dados.id).toLocaleDateString('pt-BR') : '',
      'Petição': item.texto || '',
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Petições');
    XLSX.writeFile(wb, 'biblioteca_peti_pro.xlsx');
  };

  /* ─── UI BÁSICA ──────────────────────────────────────────── */
  $('btn-hamburger').onclick = () => {
    $('sidebar').classList.toggle('open');
    $('sidebar-overlay').classList.toggle('open');
  };
  $('sidebar-overlay').onclick = () => {
    $('sidebar').classList.remove('open');
    $('sidebar-overlay').classList.remove('open');
  };
  $('btn-add-pedido').onclick = () => {
    const div = document.createElement('div');
    div.className = 'pedido-item';
    div.innerHTML = '<input type="text" placeholder="Outro pedido..." />';
    $('t-pedidos-list').appendChild(div);
  };
  $('btn-copiar').onclick = () => {
    navigator.clipboard.writeText(textoAtivo);
    $('btn-copiar').textContent = 'Copiado!';
    setTimeout(() => $('btn-copiar').textContent = 'Copiar Texto', 2000);
  };
  $('btn-nova').onclick = () => showScreen('form');
  $('btn-clear-hist').onclick = () => {
    if (confirm('Apagar toda a biblioteca?')) {
      localStorage.removeItem('petipro_h');
      renderizarBiblioteca();
    }
  };
  $('sidebar-search').oninput = renderizarBiblioteca;

  /* ─── INIT ───────────────────────────────────────────────── */
  aplicarMascaras();
  renderizarBiblioteca();
  getToken().catch(() => {});
</script>
</body>
</html>
